name: Test macOS AMD64

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string'
        required: true
        default: '0.0.0-test'

jobs:
  macos-amd64:
    name: macOS package (amd64, cross-compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake libxml2-dev libssl-dev liblzma-dev \
            wget autoconf libtool make patch python3 \
            icnsutils zip

      - name: Cache osxcross toolchain
        id: cache-osxcross
        uses: actions/cache@v4
        with:
          path: /opt/osxcross
          key: osxcross-macosx11.3-v1

      - name: Build osxcross
        if: steps.cache-osxcross.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/tpoechtrager/osxcross /tmp/osxcross-build
          cd /tmp/osxcross-build
          wget -q -O tarballs/MacOSX11.3.sdk.tar.xz \
            "https://github.com/phracker/MacOSX-SDKs/releases/download/11.3/MacOSX11.3.sdk.tar.xz"
          UNATTENDED=1 ./build.sh
          sudo mkdir -p /opt/osxcross
          sudo cp -r target/* /opt/osxcross/

      - name: Cache macOS amd64 sysroot
        id: cache-sysroot
        uses: actions/cache@v4
        with:
          path: /tmp/macos-amd64-sysroot
          key: macos-amd64-sysroot-${{ hashFiles('packaging/setup_macos_amd64_sysroot.sh') }}

      - name: Set up macOS amd64 sysroot
        if: steps.cache-sysroot.outputs.cache-hit != 'true'
        run: OSXCROSS=/opt/osxcross bash packaging/setup_macos_amd64_sysroot.sh

      - name: Build macOS package
        run: OSXCROSS=/opt/osxcross VERSION=${{ github.event.inputs.version }} bash packaging/build_macos-amd64.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: soulfu-macos-amd64-test
          path: |
            packaging/bin/*.dmg
            packaging/bin/*.zip
